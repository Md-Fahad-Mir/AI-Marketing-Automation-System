# Production: pull the prebuilt image from Docker Hub and run it.
# On the server you only need this file and a .env file:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
services:
  api:
    image: fahad1000mir/ai-marketing-automation:latest
    container_name: ai-marketing-api
    restart: unless-stopped
    env_file: .env
    environment:
      # Infra paths — point the DB and image storage at the mounted data volume.
      DATABASE_URL: sqlite:////app/data/marketing.db
      IMAGE_STORAGE_DIR: /app/data/generated_images
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data # persistent DB + generated images
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  app_data:
